<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6432c8">
  <meta name="description" content="Uma calculadora científica temática com floresta lunar e lobo 🐺🌕">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calc Lunar">
  <title>Calculadora Científica - Floresta Lunar 🐺🌕</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236432c8' width='100' height='100' rx='20'/><text x='50%' y='50%' font-size='70' text-anchor='middle' dy='.3em' fill='%23fff'>🐺</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%236432c8' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='120' text-anchor='middle' dy='.3em' fill='%23fff'>🐺</text></svg>">
</head>

<body>
  <div class="calculadora">
    <input type="text" id="display" readonly placeholder="0">

    <div class="botoes">
      <!-- Linha 1 - Funções científicas -->
      <button class="cientifica" data-value="sin(">sin</button>
      <button class="cientifica" data-value="cos(">cos</button>
      <button class="cientifica" data-value="tan(">tan</button>
      <button class="cientifica" data-value="log(">log</button>
      <button class="cientifica" data-value="ln(">ln</button>
      <button class="cientifica" data-value="sqrt(">√</button>

      <!-- Linha 2 - Parênteses, constantes e limpar -->
      <button class="cientifica" data-value="(">(</button>
      <button class="cientifica" data-value=")">)</button>
      <button class="cientifica" data-value="π">π</button>
      <button class="cientifica" data-value="e">e</button>
      <button class="cientifica" data-value="^">^</button>
      <button class="limpar" id="clear">C</button>

      <!-- Linha 3 - 7 8 9 ÷ % ± -->
      <button class="numero" data-value="7">7</button>
      <button class="numero" data-value="8">8</button>
      <button class="numero" data-value="9">9</button>
      <button class="operador" data-value="/">÷</button>
      <button class="cientifica" data-value="%">%</button>
      <button class="cientifica" id="toggle-sinal">±</button>

      <!-- Linha 4 - 4 5 6 × ✅ ✅ -->
      <button class="numero" data-value="4">4</button>
      <button class="numero" data-value="5">5</button>
      <button class="numero" data-value="6">6</button>
      <button class="operador" data-value="*">×</button>
      <div class="floresta"><span>✅</span></div>
      <div class="floresta"><span>✅</span></div>

      <!-- Linha 5 - 1 2 3 − 🐾 🌕 -->
      <button class="numero" data-value="1">1</button>
      <button class="numero" data-value="2">2</button>
      <button class="numero" data-value="3">3</button>
      <button class="operador" data-value="-">−</button>
      <div class="garras"><span>🐾</span></div>
      <div class="lua"><span>🌕</span></div>

      <!-- Linha 6 - 0 (span 2) . = + 🐺 -->
      <button class="numero zero" data-value="0">0</button>
      <button class="numero" data-value=".">.</button>
      <button class="igual" id="igual">=</button>
      <button class="operador" data-value="+">+</button>
      <div class="lobo-container">
        <span class="lobo-emoji">🐺</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(registration => {
            console.log('✅ Service Worker registrado com sucesso:', registration);
          })
          .catch(error => {
            console.log('❌ Erro ao registrar Service Worker:', error);
          });
      });
    }

    // Detectar instalação do PWA (opcional - para feedback visual)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('💾 Aplicativo pode ser instalado');
    });
  </script>
</body>

</html>
